<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>
<style>
body {
  background-image: url('image/background.jpg');
  background-repeat: no-repeat;
  background-attachment: fixed;  
  background-size: cover;}
.class1 {
border-style:solid;
border-width:4px;
border-color:brown;
border: double 15px rgba(255,255,255,0.7);
background: rgba(255,255,255,0.7);
background-clip: padding-box;}
.class2 {border-style:grove;
border-width:4px;
border-color:blue;}

.topnav {
  overflow: hidden;
  background-color: #f2f2f2;
}

.topnav a {
  float: left;
  color: #333;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
}

.topnav a:hover {
  background-color: #ddd;
  color: black;
}

.topnav a.active {
  background-color: #94a8a1;
  color: white;
}
.center {
  margin: auto;
  width: 60%;
  border: 3px groove #73AD21;
  padding: 10px;
}
body {font-family: Arial, Helvetica, sans-serif;}
* {box-sizing: border-box;}

input[type=text], select, textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
  margin-top: 6px;
  margin-bottom: 16px;
  resize: vertical;
}

input[type=submit] {
  background-color: #79a898;
  color: white;
  padding: 12px 20px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
input[type=submit]:hover {
  background-color: #94a8a1;
}
</style>
</head>
<body>
<div class="class1">
<hr>

<center><img src="image/logo.png" alt="Logo" style="width:400px">
<br>
<h1><span style="color:brown">(CLINICA MANAGEMENT
PROTOCOL: <q>COVID-19</q>)</span>
</h1>
</center>
<hr>
<div class="topnav">
  <a href="home.html">Home</a>
  <a href="news.html">News</a>
  <a class="active" href="contact.html">Contact</a>
  <a href="about.html">About</a>
</div>
<hr>
<div class="center">
<center><img src="image/image10.png">
<h1>Contact Us</h1></center>
  <form action="image/image11.jpg">
    <label for="fname">First Name</label>
    <input type="text" id="fname" name="firstname" placeholder="Your name..">

    <label for="lname">Last Name</label>
    <input type="text" id="lname" name="lastname" placeholder="Your last name..">

    <label for="country">Country</label>
    <select id="country" name="country">
      <option value="australia">Australia</option>
      <option value="canada">Canada</option>
      <option value="usa">USA</option>
      <option value="Hungary">Hungary</option>
      <option value="Iceland">Iceland</option>
      <option value="Indonesia">Indonesia</option>
      <option value="India">India</option>
    </select>

    <label for="subject">Subject</label>
    <textarea id="subject" name="subject" placeholder="Write something.." style="height:200px"></textarea>

    <input type="submit" value="Submit">
  </form>
</div>
</div>
</body>
</html>
